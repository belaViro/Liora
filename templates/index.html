<!DOCTYPE html>

<html lang="zh-CN">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Liora - 个人记忆网络</title>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/socket.io/4.0.0/socket.io.js"></script>

    <script src="https://d3js.org/d3.v7.min.js"></script>

    <!-- Fonts: 数字花园风格 -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Crimson+Text:ital,wght@0,400;0,600;1,400&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&family=Noto+Sans+SC:wght@400;500&family=Noto+Serif+SC:wght@400;600&display=swap" rel="stylesheet">

    <!-- 组件样式 -->
    <link rel="stylesheet" href="{{ url_for('static', filename='css/components/header.css') }}">

    <!-- Main CSS Modules -->
    <link rel="stylesheet" href="{{ url_for('static', filename='css/variables.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/base.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/layout.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/controls.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/graph.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/explore.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/forms.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/buttons.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/utilities.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/memory-list.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/stats.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/responsive.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/components/sidebar.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/memory-card.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/prediction.css') }}">


</head>

<body>

    <div class="container">

        {% include 'components/header.html' %}



        <!-- 主内容区-->

        <div class="main-content">

            <!-- 左侧：知识图谱-->

            <div class="graph-section">

                <div class="graph-header">

                    <span class="graph-title">知识图谱</span>

                    <div class="graph-controls">

                        <button class="control-btn active" onclick="filterGraph('all')">全部</button>

                        <button class="control-btn" onclick="filterGraph('PERSON')">人物</button>

                        <button class="control-btn" onclick="filterGraph('LOCATION')">地点</button>

                        <button class="control-btn" onclick="filterGraph('EVENT')">事件</button>

                        <button class="control-btn" onclick="filterGraph('EMOTION')">情感</button>

                        <button class="control-btn" onclick="resetGraph()">重置</button>

                    </div>

                </div>



                <svg id="graph-svg"></svg>

                <!-- 右下角导入导出按钮 -->
                <div class="graph-io-buttons">
                    <button class="control-btn" onclick="exportMemories()" title="导出记忆">导出</button>
                    <button class="control-btn" onclick="document.getElementById('importFile').click()" title="导入记忆">导入</button>
                </div>
                <input type="file" id="importFile" accept=".loyi" style="display:none;" onchange="importMemories(this)">



                <!-- 图例 -->

                <div class="graph-legend" id="graphLegend" style="display: none;">

                    <div class="legend-header" onclick="toggleLegend()">

                        <span class="legend-title">图例</span>

                        <span class="legend-toggle">▼</span>

                    </div>

                    <div class="legend-items" id="legendItems"></div>

                </div>



                <!-- 边标签开关-->

                <div class="edge-labels-toggle">

                    <label class="toggle-switch">

                        <input type="checkbox" id="showEdgeLabels">  <!-- MiroFish: 默认不勾选-->

                        <span class="slider"></span>

                    </label>

                    <span class="toggle-label">显示边标签</span>

                </div>



                <!-- 详情面板-->

                <div class="detail-panel" id="detailPanel">

                    <div class="detail-panel-header">

                        <div class="detail-header-left">

                            <span class="detail-title" id="detailTitle">详情</span>

                            <span class="detail-type-badge" id="detailTypeBadge" style="display: none;"></span>

                        </div>

                        <div class="detail-header-actions" id="detailHeaderActions">

                            <!-- 动态插入编辑按钮-->

                        </div>

                        <button class="detail-close" onclick="closeDetailPanel()">×</button>

                    </div>

                    <div class="detail-content" id="detailContent"></div>

                </div>

            </div>



            {% include 'components/sidebar.html' %}


        </div>

    </div>



    <!-- 提示消息 -->

    <div class="toast" id="toast"></div>



    <!-- 记忆卡片导出模态框 -->

    <div class="memory-card-modal" id="memoryCardModal">

        <div class="memory-card-overlay" onclick="closeMemoryCardModal()"></div>

        <div class="memory-card-container">

            <!-- 导出的卡片内容 -->

            <div class="memory-card-export" id="memoryCardExport">

                <!-- 边框装饰 -->

                <div class="card-border-frame"></div>

                <div class="card-top-line"></div>

                <div class="card-bottom-line"></div>

                

                <div class="memory-card-content">

                    <!-- 顶部品牌和日期 -->

                    <div class="card-header-row">

                        <div class="card-brand">Liora</div>

                        <div class="card-date" id="cardDate"></div>

                    </div>

                    

                    <!-- 正文内容 -->

                    <div class="memory-card-body">

                        <div class="memory-card-text" id="cardContent"></div>

                    </div>

                    

                    <!-- AI留言 -->

                    <div class="memory-card-note">

                        <div class="note-author">洛忆</div>

                        <div class="note-content" id="cardAIQuote"></div>

                    </div>

                    

                    <!-- 底部情感和签名 -->

                    <div class="memory-card-footer">

                        <div class="emotion-tag" id="cardEmotion"></div>

                        <div class="card-signature">记忆网络</div>

                    </div>

                </div>

            </div>

            

            <!-- 操作按钮 -->

            <div class="memory-card-actions">

                <button class="btn-card-action btn-download" onclick="downloadMemoryCard()">

                    <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2">

                        <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path>

                        <polyline points="7 10 12 15 17 10"></polyline>

                        <line x1="12" y1="15" x2="12" y2="3"></line>

                    </svg>

                    保存图片

                </button>

                <button class="btn-card-action btn-close" onclick="closeMemoryCardModal()">

                    关闭

                </button>

            </div>

        </div>

    </div>



    <script src="{{ url_for('static', filename='js/app.js') }}?v=2026041202"></script>
    <script src="{{ url_for('static', filename='js/prediction.js') }}?v=2026041202"></script>

</body>

</html>
