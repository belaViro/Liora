<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Liora - 个人记忆网络</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/socket.io/4.0.0/socket.io.js"></script>
    <script src="https://d3js.org/d3.v7.min.js"></script>
    <style>
        /* ============================================
           Liora Design System
           借鉴 MiroFish 极简直线风格
           融入Liora特有的暖色点缀
           ============================================ */
        
        :root {
            /* 核心色板 - 黑白灰 */
            --color-bg: #ffffff;
            --color-bg-secondary: #fafafa;
            --color-bg-tertiary: #f5f5f5;
            --color-text: #000000;
            --color-text-secondary: #666666;
            --color-text-muted: #757575;
            --color-border: #000000;
            --color-border-light: #e0e0e0;
            
            /* Liora 特色色 */
            --color-memory: #7B2D8E;        /* 紫罗兰 - 记忆主色 */
            --color-memory-light: #e3d4f7;  /* 淡紫 */
            
            /* 字体 */
            --font-mono: 'JetBrains Mono', 'SF Mono', 'Consolas', monospace;
            --font-sans: 'Noto Sans SC', 'Inter', -apple-system, sans-serif;
            
            /* 间距 */
            --space-xs: 4px;
            --space-sm: 8px;
            --space-md: 16px;
            --space-lg: 24px;
            --space-xl: 32px;
            
            /* 阴影 */
            --shadow-sm: 0 1px 2px rgba(0,0,0,0.04);
            --shadow-md: 0 4px 12px rgba(0,0,0,0.08);
            --shadow-lg: 0 8px 24px rgba(0,0,0,0.12);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: var(--font-sans);
            background-color: var(--color-bg);
            color: var(--color-text);
            line-height: 1.6;
            overflow: hidden;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }

        .container {
            width: 100vw;
            height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* ============================================
           顶部系统栏 - 借鉴终端风格
           ============================================ */
        .header {
            border-bottom: 1px solid var(--color-border);
            padding: 12px 20px;
            background-color: var(--color-bg);
            display: flex;
            align-items: center;
            gap: 20px;
            font-family: var(--font-mono);
        }

        .logo {
            font-size: 16px;
            font-weight: 600;
            letter-spacing: 0.5px;
            white-space: nowrap;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .logo::before {
            content: '◈';
            color: var(--color-memory);
            font-size: 18px;
        }

        .search-box {
            flex: 1;
            display: flex;
            border: 1px solid var(--color-border-light);
            max-width: 500px;
            background: var(--color-bg);
            transition: all 0.2s ease;
        }

        .search-box:focus-within {
            border-color: var(--color-memory);
            box-shadow: 0 0 0 3px var(--color-memory-light);
        }

        .search-input {
            flex: 1;
            padding: 8px 12px;
            border: none;
            outline: none;
            font-size: 13px;
            font-family: var(--font-mono);
            background: transparent;
        }

        .search-input::placeholder {
            color: var(--color-text-muted);
        }

        .search-button {
            padding: 10px 16px;
            border: none;
            border-left: 1px solid var(--color-border-light);
            background-color: var(--color-bg);
            color: var(--color-text);
            cursor: pointer;
            font-family: var(--font-mono);
            font-size: 12px;
            font-weight: 500;
            transition: all 0.2s ease;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .search-button:hover {
            background-color: var(--color-memory);
            color: #fff;
            border-color: var(--color-memory);
        }

        .search-button:focus-visible {
            outline: 2px solid var(--color-memory);
            outline-offset: 2px;
        }

        /* ============================================
           Liora 控制面板 - 开发者工具风格
           ============================================ */
        .memory-network-controls {
            display: flex;
            gap: 8px;
            margin-left: auto;
        }

        .memory-network-controls .control-btn {
            padding: 10px 14px;
            border: 1px solid var(--color-border-light);
            background: var(--color-bg);
            cursor: pointer;
            font-size: 11px;
            font-family: var(--font-mono);
            transition: all 0.2s ease;
            white-space: nowrap;
            border-radius: 4px;
            letter-spacing: 0.3px;
        }

        .memory-network-controls .control-btn:hover {
            background: var(--color-bg-secondary);
            border-color: var(--color-text-secondary);
        }

        .memory-network-controls .control-btn.active {
            background: var(--color-memory);
            color: #fff;
            border-color: var(--color-memory);
        }

        .memory-network-controls .control-btn:focus-visible {
            outline: 2px solid var(--color-memory);
            outline-offset: 2px;
        }

        /* ============================================
           主内容区 - 双栏布局
           ============================================ */
        .main-content {
            flex: 1;
            display: flex;
            overflow: hidden;
        }

        /* ============================================
           左侧：知识图谱 - 点阵网格背景
           ============================================ */
        .graph-section {
            flex: 1;
            position: relative;
            background-color: #FAFAFA;  /* MiroFish */
            background-image: radial-gradient(#D0D0D0 1.5px, transparent 1.5px);  /* MiroFish */
            background-size: 24px 24px;  /* MiroFish */
        }

        .graph-header {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            padding: 16px 20px;
            z-index: 10;
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: linear-gradient(to bottom, rgba(255,255,255,0.98), rgba(255,255,255,0));
            pointer-events: none;
        }

        .graph-title {
            font-family: var(--font-mono);
            font-size: 12px;
            font-weight: 600;
            pointer-events: auto;
            letter-spacing: 0.5px;
            text-transform: uppercase;
        }

        .graph-title::before {
            content: '// ';
            color: var(--color-memory);
        }

        .graph-controls {
            pointer-events: auto;
            display: flex;
            gap: 6px;
            align-items: center;
        }

        .graph-controls .control-btn {
            padding: 5px 10px;
            border: 1px solid var(--color-border-light);
            background: var(--color-bg);
            cursor: pointer;
            font-size: 11px;
            font-family: var(--font-mono);
            transition: all 0.2s ease;
            border-radius: 3px;
        }

        .graph-controls .control-btn:hover {
            background-color: var(--color-bg-tertiary);
            border-color: var(--color-text-secondary);
        }

        .graph-controls .control-btn.active {
            background-color: var(--color-text);
            color: var(--color-bg);
            border-color: var(--color-text);
        }

        .graph-controls .control-btn:focus-visible {
            outline: 2px solid var(--color-memory);
            outline-offset: 2px;
        }

        /* 布局选择器 */
        .layout-selector {
            margin-left: 8px;
            padding-left: 8px;
            border-left: 1px solid var(--color-border-light);
        }

        .layout-selector select {
            padding: 5px 10px;
            border: 1px solid var(--color-border-light);
            background: var(--color-bg);
            font-family: var(--font-mono);
            font-size: 11px;
            cursor: pointer;
            outline: none;
        }

        .layout-selector select:focus-visible {
            outline: 2px solid var(--color-memory);
            outline-offset: 2px;
        }

        #graph-svg {
            width: 100%;
            height: 100%;
            cursor: grab;
        }

        #graph-svg:active {
            cursor: grabbing;
        }

        /* ============================================
           图例 - 左下角卡片（可折叠、可滚动）
           ============================================ */
        .graph-legend {
            position: absolute;
            bottom: 20px;
            left: 20px;
            background: rgba(255,255,255,0.98);
            padding: 12px 16px;
            border: 1px solid var(--color-border-light);
            box-shadow: var(--shadow-md);
            z-index: 10;
            font-family: var(--font-mono);
            font-size: 11px;
            width: 260px;
            max-height: 300px;
            display: flex;
            flex-direction: column;
            transition: max-height 0.25s ease;
            box-sizing: border-box;
        }

        .graph-legend.collapsed {
            max-height: 40px;
            overflow: hidden;
        }

        .legend-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            cursor: pointer;
            user-select: none;
        }

        .legend-title {
            font-size: 10px;
            font-weight: 600;
            color: var(--color-memory);
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .legend-toggle {
            font-size: 10px;
            color: var(--color-text-secondary);
            transition: transform 0.2s;
        }

        .graph-legend.collapsed .legend-toggle {
            transform: rotate(-90deg);
        }

        .legend-items {
            flex: 1;
            overflow-y: auto;
            overflow-x: hidden;
            margin-top: 10px;
            padding-right: 4px;
            scrollbar-width: thin;
            scrollbar-color: var(--color-border-light) transparent;
            max-width: 100%;
            box-sizing: border-box;
        }

        .legend-items::-webkit-scrollbar {
            width: 4px;
        }

        .legend-items::-webkit-scrollbar-thumb {
            background: var(--color-border-light);
            border-radius: 2px;
        }

        .legend-section {
            margin-bottom: 12px;
            width: 100%;
            overflow: hidden;
            box-sizing: border-box;
        }

        .legend-section:last-child {
            margin-bottom: 0;
        }

        .legend-section-title {
            font-size: 10px;
            font-weight: 600;
            color: #666;
            margin-bottom: 6px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 8px;
            overflow: hidden;
            max-width: 100%;
        }

        .legend-section-title span:first-child {
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        .legend-section-count {
            font-size: 9px;
            color: #999;
            font-weight: normal;
            flex-shrink: 0;
        }

        .legend-item {
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 11px;
            color: var(--color-text-secondary);
            padding: 2px 0;
            overflow: hidden;
            width: 100%;
            min-width: 0;
            box-sizing: border-box;
        }

        .legend-label {
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
            flex: 1;
            min-width: 0;
            max-width: calc(100% - 20px);
        }

        .legend-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            flex-shrink: 0;
        }

        .legend-more {
            font-size: 10px;
            color: #999;
            font-style: italic;
            padding: 4px 0;
            cursor: pointer;
        }

        .legend-more:hover {
            color: var(--color-memory);
        }

        /* 边标签开关 - 右上角 */
        .edge-labels-toggle {
            position: absolute;
            top: 80px;
            right: 20px;
            display: flex;
            align-items: center;
            gap: 10px;
            background: var(--color-bg);
            padding: 10px 14px;
            border: 1px solid var(--color-border-light);
            box-shadow: var(--shadow-md);
            z-index: 10;
        }

        .toggle-switch {
            position: relative;
            display: inline-block;
            width: 40px;
            height: 22px;
        }

        .toggle-switch input {
            opacity: 0;
            width: 0;
            height: 0;
        }

        .slider {
            position: absolute;
            cursor: pointer;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background-color: #e0e0e0;
            border-radius: 22px;
            transition: 0.3s;
        }

        .slider:before {
            position: absolute;
            content: "";
            height: 16px;
            width: 16px;
            left: 3px;
            bottom: 3px;
            background-color: white;
            border-radius: 50%;
            transition: 0.3s;
        }

        input:checked + .slider {
            background-color: #7b2d8e;
        }

        input:checked + .slider:before {
            transform: translateX(18px);
        }

        .toggle-label {
            font-size: 12px;
            color: #666;
        }

        /* 详情面板 - 右侧 */
        .detail-panel {
            position: absolute;
            top: 140px;
            right: 20px;
            width: 320px;
            max-height: calc(100% - 180px);
            background: var(--color-bg);
            border: 1px solid var(--color-border-light);
            box-shadow: var(--shadow-lg);
            overflow: hidden;
            font-size: 13px;
            z-index: 20;
            display: none;
            flex-direction: column;
        }

        .detail-panel.show {
            display: flex;
        }

        .detail-panel-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 14px 16px;
            background: #fafafa;
            border-bottom: 1px solid #eee;
            flex-shrink: 0;
        }

        .detail-title {
            font-weight: 600;
            color: #333;
            font-size: 14px;
        }

        .detail-type-badge {
            padding: 4px 10px;
            border-radius: 12px;
            font-size: 11px;
            font-weight: 500;
            margin-left: auto;
            margin-right: 12px;
            color: #fff;
        }

        .detail-close {
            background: none;
            border: none;
            font-size: 20px;
            cursor: pointer;
            color: #999;
            line-height: 1;
            padding: 0;
            transition: color 0.2s;
        }

        .detail-close:hover {
            color: #333;
        }

        .detail-content {
            padding: 16px;
            overflow-y: auto;
            flex: 1;
        }

        .detail-row {
            margin-bottom: 12px;
            display: flex;
            flex-wrap: wrap;
            gap: 4px;
        }

        .detail-label {
            color: #888;
            font-size: 12px;
            font-weight: 500;
            min-width: 80px;
        }

        .detail-value {
            color: #333;
            flex: 1;
            word-break: break-word;
        }

        .detail-value.uuid-text {
            font-family: 'JetBrains Mono', monospace;
            font-size: 11px;
            color: #666;
        }

        .detail-section {
            margin-top: 16px;
            padding-top: 14px;
            border-top: 1px solid #f0f0f0;
        }

        .section-title {
            font-size: 12px;
            font-weight: 600;
            color: #666;
            margin-bottom: 10px;
        }

        .properties-list {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .property-item {
            display: flex;
            gap: 8px;
        }

        .property-key {
            color: #888;
            font-weight: 500;
            min-width: 90px;
        }

        .property-value {
            color: #333;
            flex: 1;
        }

        /* 边关系头部 */
        .edge-relation-header {
            background: #f8f8f8;
            padding: 12px;
            border-radius: 8px;
            margin-bottom: 16px;
            font-size: 13px;
            font-weight: 500;
            color: #333;
            line-height: 1.5;
            word-break: break-word;
        }

        /* 关系强度条 */
        .strength-bar {
            height: 6px;
            background: #e0e0e0;
            border-radius: 3px;
            overflow: hidden;
        }

        .strength-bar-fill {
            height: 100%;
            border-radius: 3px;
            transition: width 0.3s ease;
        }

        /* 关系详情中的实体名称高亮 */
        .entity-name-highlight {
            font-weight: 600;
            color: #333;
        }

        .relation-type-badge {
            display: inline-block;
            padding: 2px 8px;
            border-radius: 4px;
            font-size: 11px;
            font-weight: 500;
            background: #f0f0f0;
            color: #666;
        }

        /* 关联记忆列表 */
        .related-memory-item {
            display: flex;
            align-items: center;
            gap: 6px;
            padding: 8px 10px;
            background: #f8f8f8;
            border-radius: 6px;
            margin-bottom: 6px;
            transition: background 0.2s;
        }

        .related-memory-item:hover {
            background: #f0f0f0;
        }

        .related-memory-icon {
            font-size: 12px;
        }

        .related-memory-id {
            flex: 1;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
            font-family: 'JetBrains Mono', monospace;
            font-size: 10px;
            color: #666;
        }

        /* ============================================
           右侧：操作面板 - 终端风格侧边栏
           ============================================ */
        .sidebar {
            width: clamp(300px, 28vw, 380px);
            min-width: 300px;
            max-width: 380px;
            display: flex;
            flex-direction: column;
            background-color: var(--color-bg);
            border-left: 1px solid var(--color-border);
            font-family: var(--font-mono);
            flex-shrink: 0;
        }

        /* 选项卡 - 类终端标签 */
        .tabs {
            display: flex;
            background: var(--color-bg-secondary);
            border-bottom: 1px solid var(--color-border);
        }

        .tab {
            flex: 1;
            padding: 10px 8px;
            border: none;
            border-right: 1px solid var(--color-border-light);
            background-color: transparent;
            cursor: pointer;
            font-size: 11px;
            font-family: var(--font-mono);
            font-weight: 500;
            transition: all 0.2s ease;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            color: var(--color-text-secondary);
        }

        .tab:last-child {
            border-right: none;
        }

        .tab.active {
            background-color: var(--color-bg);
            color: var(--color-text);
            box-shadow: inset 0 2px 0 var(--color-memory);
        }

        .tab:not(.active):hover {
            background-color: rgba(0,0,0,0.02);
            color: var(--color-text);
        }

        .tab:focus-visible {
            outline: 2px solid var(--color-memory);
            outline-offset: -2px;
            z-index: 1;
        }

        /* 面板内容 */
        .panel-content {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
        }

        .panel {
            display: none;
        }

        .panel.active {
            display: block;
        }

        /* ============================================
           输入表单 - 极简工业风
           ============================================ */
        .form-group {
            margin-bottom: 20px;
        }

        .form-label {
            display: block;
            font-size: 10px;
            font-weight: 600;
            margin-bottom: 6px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            color: var(--color-text-secondary);
        }

        .form-input,
        .form-textarea,
        .form-select {
            width: 100%;
            padding: 10px 12px;
            border: 1px solid var(--color-border-light);
            font-size: 13px;
            font-family: var(--font-sans);
            outline: none;
            background: var(--color-bg);
            transition: all 0.2s ease;
        }

        .form-textarea {
            min-height: 120px;
            resize: vertical;
            line-height: 1.6;
        }

        .form-input:focus,
        .form-textarea:focus,
        .form-select:focus {
            border-color: var(--color-memory);
            outline: none;
        }

        .form-input:focus-visible,
        .form-textarea:focus-visible,
        .form-select:focus-visible {
            outline: 2px solid var(--color-memory);
            outline-offset: 2px;
        }

        /* ============================================
           文件上传 - 拖拽区域
           ============================================ */
        .file-upload {
            border: 1px dashed var(--color-border-light);
            padding: 24px;
            text-align: center;
            cursor: pointer;
            transition: all 0.2s ease;
            background: var(--color-bg);
            font-size: 12px;
            color: var(--color-text-secondary);
        }

        .file-upload:hover {
            border-color: var(--color-memory);
            background-color: var(--color-memory-light);
            color: var(--color-memory);
        }

        .file-upload input[type="file"] {
            display: none;
        }

        .file-preview {
            margin-top: 12px;
            padding: 10px 12px;
            border: 1px solid var(--color-border-light);
            font-size: 11px;
            font-family: var(--font-mono);
            background: var(--color-bg-secondary);
        }

        /* ============================================
           按钮系统
           ============================================ */
        .btn {
            padding: 10px 16px;
            border: 1px solid var(--color-border);
            background-color: var(--color-bg);
            cursor: pointer;
            font-size: 12px;
            font-family: var(--font-mono);
            font-weight: 500;
            transition: all 0.2s ease;
            width: 100%;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .btn:hover {
            background-color: var(--color-text);
            color: var(--color-bg);
        }

        .btn-primary {
            background-color: var(--color-memory);
            color: #fff;
            border-color: var(--color-memory);
        }

        .btn-primary:hover {
            background-color: #6a2580;
            border-color: #6a2580;
        }

        .btn:disabled {
            opacity: 0.4;
            cursor: not-allowed;
        }

        .btn:focus-visible {
            outline: 2px solid var(--color-memory);
            outline-offset: 2px;
        }

        .btn:hover:not(:disabled) {
            transform: translateY(-1px);
            box-shadow: var(--shadow-sm);
        }

        .btn:active:not(:disabled) {
            transform: translateY(0);
        }

        /* ============================================
           状态提示 - 终端风格
           ============================================ */
        .status-message {
            padding: 12px 16px;
            margin-bottom: 16px;
            border-left: 4px solid var(--color-border);
            font-size: 12px;
            font-family: var(--font-mono);
            font-weight: 500;
            display: none;
            background: var(--color-bg-secondary);
        }

        .status-message.show {
            display: block;
        }

        .status-message.processing {
            border-left-color: #f39c12;
            background-color: #fff8e6;
            color: #8b6914;
        }

        .status-message.completed {
            border-left-color: #1a936f;
            background-color: #e8f5f0;
            color: #1a6b4d;
        }

        .status-message.error {
            border-left-color: #e74c3c;
            background-color: #fdf2f0;
            color: #a0301e;
        }

        /* ============================================
           记忆列表 - 卡片列表
           ============================================ */
        .memory-list {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .memory-item {
            border: 1px solid var(--color-border-light);
            padding: 14px;
            cursor: pointer;
            transition: all 0.2s ease;
            position: relative;
            background: var(--color-bg);
        }

        .memory-item:hover {
            border-color: var(--color-memory);
            box-shadow: var(--shadow-sm);
            transform: translateX(2px);
        }

        .memory-item:focus-visible {
            outline: 2px solid var(--color-memory);
            outline-offset: 2px;
            border-color: var(--color-memory);
        }

        .memory-item:hover .memory-delete-btn {
            opacity: 1;
        }

        .memory-item-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 6px;
        }

        .memory-type {
            font-size: 9px;
            padding: 2px 8px;
            border: 1px solid var(--color-border-light);
            font-family: var(--font-mono);
            text-transform: uppercase;
            letter-spacing: 0.5px;
            color: var(--color-text-secondary);
        }

        .memory-date {
            font-size: 10px;
            color: var(--color-text-muted);
            font-family: var(--font-mono);
        }

        .memory-delete-btn {
            position: absolute;
            top: 10px;
            right: 10px;
            width: 20px;
            height: 20px;
            border: 1px solid var(--color-border-light);
            background: var(--color-bg);
            cursor: pointer;
            font-size: 12px;
            line-height: 1;
            color: var(--color-text-muted);
            opacity: 0;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .memory-delete-btn:hover {
            background: #e74c3c;
            border-color: #e74c3c;
            color: #fff;
        }

        .memory-content {
            font-size: 13px;
            line-height: 1.5;
            overflow: hidden;
            text-overflow: ellipsis;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            color: var(--color-text);
        }

        .memory-entities {
            margin-top: 10px;
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
        }

        .entity-tag {
            font-size: 9px;
            padding: 2px 8px;
            background-color: var(--color-bg-secondary);
            border: 1px solid var(--color-border-light);
            font-family: var(--font-mono);
            text-transform: uppercase;
            letter-spacing: 0.3px;
            color: var(--color-text-secondary);
        }

        /* ============================================
           统计信息 - 数据卡片
           ============================================ */
        .stats-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            margin-bottom: 20px;
        }

        .stat-card {
            border: 1px solid var(--color-border-light);
            padding: 16px;
            text-align: center;
            background: var(--color-bg);
            transition: all 0.2s ease;
        }

        .stat-card:hover {
            border-color: var(--color-memory);
            box-shadow: var(--shadow-sm);
        }

        .stat-number {
            font-size: 28px;
            font-weight: 600;
            margin-bottom: 4px;
            font-family: var(--font-mono);
            color: var(--color-memory);
        }

        .stat-label {
            font-size: 10px;
            color: var(--color-text-secondary);
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        /* ============================================
           加载动画
           ============================================ */
        .loading {
            display: inline-block;
            width: 14px;
            height: 14px;
            border: 2px solid var(--color-border-light);
            border-radius: 50%;
            border-top-color: var(--color-memory);
            animation: spin 0.8s linear infinite;
            margin-right: 8px;
            vertical-align: middle;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        /* ============================================
           提示消息 - Toast
           ============================================ */
        .toast {
            position: fixed;
            top: 20px;
            right: 20px;
            padding: 14px 20px;
            border-left: 3px solid var(--color-border);
            background-color: var(--color-bg);
            font-family: var(--font-mono);
            font-size: 12px;
            transform: translateX(150%);
            transition: transform 0.3s ease;
            z-index: 1000;
            box-shadow: var(--shadow-lg);
        }

        .toast.show {
            transform: translateX(0);
        }

        .toast.success {
            border-left-color: #1a936f;
            background-color: #f0f9f5;
        }

        .toast.error {
            border-left-color: #e74c3c;
            background-color: #fdf2f0;
        }

        /* ============================================
           滚动条 - 极窄黑条
           ============================================ */
        ::-webkit-scrollbar {
            width: 6px;
            height: 6px;
        }

        ::-webkit-scrollbar-track {
            background: var(--color-bg-secondary);
        }

        ::-webkit-scrollbar-thumb {
            background: var(--color-text-secondary);
            border-radius: 0;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: #333333;
        }

        /* ============================================
           图谱Tooltip样式
           ============================================ */
        .graph-tooltip {
            font-family: var(--font-mono);
            line-height: 1.5;
            background: var(--color-bg);
            border: 1px solid var(--color-border-light);
            padding: 12px 14px;
            box-shadow: var(--shadow-md);
            max-width: 260px;
            font-size: 11px;
        }

        /* 图谱节点文字 */
        #graph-svg text {
            font-family: var(--font-sans);
            user-select: none;
        }

        /* ============================================
           移动端菜单
           ============================================ */
        .mobile-menu-btn {
            display: none;
            flex-direction: column;
            gap: 4px;
            padding: 8px;
            background: none;
            border: 1px solid var(--color-border-light);
            cursor: pointer;
        }

        .mobile-menu-btn span {
            display: block;
            width: 18px;
            height: 2px;
            background: var(--color-text);
            transition: all 0.2s ease;
        }

        .mobile-menu {
            display: none;
            position: absolute;
            top: 50px;
            right: 20px;
            background: var(--color-bg);
            border: 1px solid var(--color-border);
            box-shadow: var(--shadow-lg);
            padding: 12px;
            flex-direction: column;
            gap: 8px;
            z-index: 100;
            min-width: 140px;
        }

        .mobile-menu.show {
            display: flex;
        }

        .mobile-menu .control-btn {
            width: 100%;
            text-align: left;
        }

        /* ============================================
           响应式布局
           ============================================ */
        
        /* 平板及以下 */
        @media (max-width: 1024px) {
            .sidebar {
                width: 320px;
                min-width: 280px;
            }
            
            .search-box {
                max-width: 400px;
            }
        }

        /* 小平板 */
        @media (max-width: 900px) {
            .memory-network-controls {
                display: none;
            }
            
            .mobile-menu-btn {
                display: flex;
                margin-left: auto;
            }
            
            .search-box {
                max-width: none;
                flex: 1;
            }
        }

        /* 手机 */
        @media (max-width: 768px) {
            .header {
                padding: 10px 16px;
                gap: 12px;
            }
            
            .logo {
                font-size: 14px;
            }
            
            .search-input {
                padding: 6px 10px;
                font-size: 14px; /* 防止iOS缩放 */
            }
            
            .search-button {
                padding: 6px 12px;
                font-size: 11px;
            }
            
            .main-content {
                flex-direction: column;
            }
            
            .sidebar {
                width: 100%;
                height: 35vh;
                min-height: 250px;
                border-left: none;
                border-top: 1px solid var(--color-border);
            }
            
            .panel-content {
                padding: 16px;
            }
            
            .graph-legend {
                bottom: 12px;
                left: 12px;
                padding: 10px 14px;
                width: 200px;
                max-height: 240px;
            }
            
            .edge-labels-toggle {
                top: 50px;
                right: 12px;
                padding: 6px 10px;
            }
            
            .detail-panel {
                width: calc(100% - 40px);
                right: 20px;
                left: 20px;
                top: 50px;
                max-height: 60vh;
            }
            
            .form-group {
                margin-bottom: 16px;
            }
            
            .form-textarea {
                min-height: 80px;
            }
            
            .recall-panel {
                width: calc(100% - 40px);
                right: 20px;
                left: 20px;
                top: 60px;
                max-height: 50vh;
            }
        }

        /* 小屏手机 */
        @media (max-width: 480px) {
            .header {
                flex-wrap: wrap;
                padding: 8px 12px;
            }
            
            .logo {
                order: 1;
            }
            
            .mobile-menu-btn {
                order: 2;
                margin-left: auto;
            }
            
            .search-box {
                order: 3;
                width: 100%;
                margin-top: 8px;
            }
            
            .graph-header {
                padding: 10px 12px;
                flex-direction: column;
                align-items: flex-start;
                gap: 8px;
            }
            
            .graph-controls {
                flex-wrap: wrap;
            }
            
            .graph-controls .control-btn {
                padding: 4px 8px;
                font-size: 10px;
            }
            
            .tabs {
                overflow-x: auto;
                -webkit-overflow-scrolling: touch;
            }
            
            .tab {
                white-space: nowrap;
                padding: 10px 16px;
            }
            
            .stats-grid {
                grid-template-columns: 1fr 1fr;
                gap: 8px;
            }
            
            .stat-card {
                padding: 12px;
            }
            
            .stat-number {
                font-size: 20px;
            }
        }

        /* 横屏手机 */
        @media (max-height: 500px) and (orientation: landscape) {
            .header {
                padding: 6px 12px;
            }
            
            .sidebar {
                height: 45vh;
                min-height: 200px;
            }
            
            .form-textarea {
                min-height: 60px;
            }
        }

        /* 触控优化 */
        @media (hover: none) and (pointer: coarse) {
            .control-btn,
            .tab,
            .btn {
                min-height: 44px; /* iOS推荐的最小触控区域 */
            }
            
            .memory-delete-btn {
                opacity: 1;
                width: 32px;
                height: 32px;
            }
            
            .detail-close {
                width: 44px;
                height: 44px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- 顶部搜索栏 -->
        <div class="header">
            <div class="logo">◈ Liora</div>
            <div class="search-box">
                <input type="text" class="search-input" id="searchInput" placeholder="搜索你的记忆...">
                <button class="search-button" onclick="searchMemories()">搜索</button>
            </div>

            <!-- 移动端菜单按钮 -->
            <button class="mobile-menu-btn" onclick="toggleMobileMenu()" title="菜单">
                <span></span>
                <span></span>
                <span></span>
            </button>
        </div>
        <!-- 移动端菜单 -->
        <div class="mobile-menu" id="mobileMenu">
        </div>

        <!-- 主内容区 -->
        <div class="main-content">
            <!-- 左侧：知识图谱 -->
            <div class="graph-section">
                <div class="graph-header">
                    <span class="graph-title">知识图谱</span>
                    <div class="graph-controls">
                        <button class="control-btn active" onclick="filterGraph('all')">全部</button>
                        <button class="control-btn" onclick="filterGraph('PERSON')">人物</button>
                        <button class="control-btn" onclick="filterGraph('LOCATION')">地点</button>
                        <button class="control-btn" onclick="filterGraph('EVENT')">事件</button>
                        <button class="control-btn" onclick="resetGraph()">重置</button>
                        <div class="layout-selector">
                            <select id="layoutSelect" onchange="changeLayout(this.value)" title="切换布局">
                                <option value="force">力导向</option>
                                <option value="circular">圆环布局</option>
                                <option value="hierarchical">层次布局</option>
                                <option value="grid">网格布局</option>
                                <option value="concentric">同心圆</option>
                            </select>
                        </div>
                    </div>
                </div>

                <svg id="graph-svg"></svg>

                <!-- 图例 -->
                <div class="graph-legend" id="graphLegend" style="display: none;">
                    <div class="legend-header" onclick="toggleLegend()">
                        <span class="legend-title">图例</span>
                        <span class="legend-toggle">▼</span>
                    </div>
                    <div class="legend-items" id="legendItems"></div>
                </div>

                <!-- 边标签开关 -->
                <div class="edge-labels-toggle">
                    <label class="toggle-switch">
                        <input type="checkbox" id="showEdgeLabels" checked>
                        <span class="slider"></span>
                    </label>
                    <span class="toggle-label">显示边标签</span>
                </div>

                <!-- 详情面板 -->
                <div class="detail-panel" id="detailPanel">
                    <div class="detail-panel-header">
                        <span class="detail-title" id="detailTitle">详情</span>
                        <span class="detail-type-badge" id="detailTypeBadge" style="display: none;"></span>
                        <button class="detail-close" onclick="closeDetailPanel()">×</button>
                    </div>
                    <div class="detail-content" id="detailContent"></div>
                </div>
            </div>

            <!-- 右侧：操作面板 -->
            <div class="sidebar">
                <!-- 选项卡 -->
                <div class="tabs">
                    <button class="tab active" onclick="switchTab('create')">录入记忆</button>
                    <button class="tab" onclick="switchTab('memories')">记忆列表</button>
                    <button class="tab" onclick="switchTab('stats')">统计</button>
                </div>

                <!-- 面板内容 -->
                <div class="panel-content">
                    <!-- 录入记忆面板 -->
                    <div class="panel active" id="panel-create">
                        <div class="status-message" id="statusMessage"></div>

                        <form id="memoryForm" onsubmit="submitMemory(event)">
                            <div class="form-group">
                                <label class="form-label">记忆类型</label>
                                <select class="form-select" id="memoryType" onchange="onTypeChange()">
                                    <option value="text">文字</option>
                                    <option value="image">图片</option>
                                    <option value="audio">音频</option>
                                </select>
                            </div>

                            <div class="form-group">
                                <label class="form-label">内容描述</label>
                                <textarea class="form-textarea" id="memoryContent" placeholder="记录你的想法、感受或事件..."></textarea>
                            </div>

                            <div class="form-group" id="fileUploadGroup" style="display: none;">
                                <label class="form-label">上传文件</label>
                                <label class="file-upload">
                                    <input type="file" id="memoryFile" onchange="onFileSelect(event)">
                                    <span>点击或拖拽文件到此处</span>
                                </label>
                                <div class="file-preview" id="filePreview" style="display: none;"></div>
                            </div>

                            <button type="submit" class="btn btn-primary" id="submitBtn">
                                保存记忆
                            </button>
                        </form>
                    </div>

                    <!-- 记忆列表面板 -->
                    <div class="panel" id="panel-memories">
                        <div class="memory-list" id="memoryList">
                            <!-- 记忆列表将在这里动态生成 -->
                        </div>
                    </div>

                    <!-- 统计面板 -->
                    <div class="panel" id="panel-stats">
                        <div class="stats-grid">
                            <div class="stat-card">
                                <div class="stat-number" id="statMemories">0</div>
                                <div class="stat-label">记忆总数</div>
                            </div>
                            <div class="stat-card">
                                <div class="stat-number" id="statEntities">0</div>
                                <div class="stat-label">实体数量</div>
                            </div>
                            <div class="stat-card">
                                <div class="stat-number" id="statRelations">0</div>
                                <div class="stat-label">关系数量</div>
                            </div>
                            <div class="stat-card">
                                <div class="stat-number" id="statToday">0</div>
                                <div class="stat-label">今日新增</div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- 提示消息 -->
    <div class="toast" id="toast"></div>

    <script src="{{ url_for('static', filename='js/app.js') }}"></script>
</body>
</html>
