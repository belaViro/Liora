<!-- 顶部搜索记忆 -->
<div class="header">
    <img src="{{ url_for('static', filename='logo.png') }}" alt="" class="logo-img" height="32">

    <!-- 移动端菜单按钮 -->
    <button class="mobile-menu-btn" onclick="toggleMobileSidebar()" title="打开菜单" aria-label="打开菜单">
        <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2">
            <line x1="3" y1="6" x2="21" y2="6"></line>
            <line x1="3" y1="12" x2="21" y2="12"></line>
            <line x1="3" y1="18" x2="21" y2="18"></line>
        </svg>
    </button>

    <div class="search-box">
        <input type="text" class="search-input" id="searchInput" placeholder="搜索你的记忆..">
        <button class="search-button" onclick="searchMemories()">搜索</button>
    </div>

    <!-- 历史上的今天入口 -->
    <button class="time-travel-btn" onclick="openTimeTravelPanel()" title="历史上的今天">
        <span class="time-travel-icon">⏱</span>
        <span class="time-travel-text">时光</span>
    </button>
</div>
